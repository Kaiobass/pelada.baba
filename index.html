<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUT-DESASTRE | Matchmaker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter'], display: ['Oswald'] },
                    colors: { ea: { dark: '#050505', panel: '#1a1a1e', neon: '#dfff00' } }
                }
            }
        }
    </script>
    <style>
        body { background: #050505; color: #eee; }
        .star { font-size: 1.5rem; cursor: pointer; position: relative; display: inline-block; color: #333; transition: transform 0.1s; }
        .star:hover { transform: scale(1.2); }
        .star-full { color: #dfff00; text-shadow: 0 0 8px rgba(223, 255, 0, 0.4); }
        .star-half::before {
            content: '★'; position: absolute; left: 0; width: 50%; overflow: hidden;
            color: #dfff00; text-shadow: 0 0 8px rgba(223, 255, 0, 0.4);
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-end gap-4 border-b border-white/10 pb-6">
            <h1 class="font-display text-5xl italic uppercase tracking-tighter">FUT-<span class="text-ea-neon">DESASTRE</span></h1>
            <button onclick="clearAll()" class="text-xs uppercase font-bold text-red-500 hover:text-red-400 tracking-widest">Reset Geral</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-ea-panel p-6 rounded-tr-3xl border-l-2 border-ea-neon shadow-2xl">
                    <h2 class="font-display text-xl uppercase italic mb-4 tracking-tight text-white">Convocar Jogadores</h2>
                    <textarea id="bulkList" rows="6" class="w-full bg-black border border-white/10 rounded-lg p-4 text-sm focus:ring-1 focus:ring-ea-neon outline-none resize-none placeholder-gray-700" placeholder="Cole a lista do WhatsApp aqui..."></textarea>
                    <button onclick="handleImport()" class="w-full mt-4 bg-ea-neon text-black font-display font-bold py-4 uppercase hover:bg-white transition-all tracking-wider italic">Lançar no Sistema</button>
                </div>

                <div id="configArea" class="hidden bg-ea-panel p-6 border-l-2 border-blue-500 shadow-2xl">
                    <label class="block text-[10px] font-bold uppercase text-gray-500 mb-2 tracking-widest">Jogadores por Time</label>
                    <input type="number" id="teamSize" value="5" class="bg-black border border-white/10 w-full p-3 font-display text-2xl text-ea-neon outline-none">
                    <button onclick="runMatchmaking()" class="w-full mt-4 bg-blue-600 text-white font-display font-bold py-4 uppercase hover:bg-blue-500 transition-all tracking-widest">Sortear Baba</button>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div id="rosterArea" class="hidden bg-ea-panel p-6 rounded-tl-3xl shadow-2xl min-h-[400px]">
                    <div class="flex justify-between items-center mb-6 border-b border-white/5 pb-4">
                        <h2 class="font-display text-2xl uppercase italic text-white">Scouting Report</h2>
                        <span class="text-ea-neon font-display text-3xl" id="counter">0</span>
                    </div>
                    <div id="listContainer" class="space-y-3"></div>
                </div>
            </div>
        </div>

        <section id="resultsSection" class="hidden mt-20 border-t border-white/10 pt-10">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <h2 class="font-display text-4xl uppercase italic font-bold text-white">Escalações</h2>
                <button id="btnCopyAll" onclick="copyAllTeamsToClipboard()" class="bg-white hover:bg-ea-neon text-black font-bold py-2 px-6 rounded-full text-xs uppercase tracking-widest transition-all flex items-center gap-2">
                    <span>Copiar Todos os Times</span>
                </button>
            </div>
            <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 pb-20"></div>
        </section>
    </div>

    <script>
        let players = new Map();
        let currentTeams = []; // Estado global para os times sorteados

        function handleImport() {
            const text = document.getElementById('bulkList').value;
            const lines = text.split('\n');
            lines.forEach(line => {
                const name = line.replace(/^\d+[\.\-\s) Duarte]+/, '').trim();
                if (name.length > 1 && !players.has(name.toLowerCase())) {
                    players.set(name.toLowerCase(), { id: crypto.randomUUID(), name: name, tech: 3.0, phys: 3.0 });
                }
            });
            document.getElementById('bulkList').value = '';
            syncUI();
        }

        function syncUI() {
            const container = document.getElementById('listContainer');
            const rosterArea = document.getElementById('rosterArea');
            const configArea = document.getElementById('configArea');
            if (players.size > 0) { rosterArea.classList.remove('hidden'); configArea.classList.remove('hidden'); }
            container.innerHTML = '';
            document.getElementById('counter').innerText = players.size;
            players.forEach(p => {
                const row = document.createElement('div');
                row.className = "flex items-center justify-between p-4 bg-black/40 border border-white/5 rounded-xl hover:bg-black/60 transition-all";
                row.innerHTML = `<div class="flex flex-col"><span class="font-bold uppercase text-sm text-white">${p.name}</span><span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest italic">OVR: ${((p.tech + p.phys)/2).toFixed(1)}</span></div><div class="flex gap-10">${renderAttributeGroup(p.id, 'Técnica', 'tech', p.tech)}${renderAttributeGroup(p.id, 'Físico', 'phys', p.phys)}</div>`;
                container.appendChild(row);
            });
        }

        function renderAttributeGroup(id, label, type, currentVal) {
            let starsHtml = '';
            for (let i = 1; i <= 5; i++) {
                let stateClass = '';
                if (currentVal >= i) stateClass = 'star-full';
                else if (currentVal >= i - 0.5) stateClass = 'star-half';
                starsHtml += `<span class="star ${stateClass}" onclick="handleStarClick(event, '${id}', '${type}', ${i})">★</span>`;
            }
            return `<div class="flex flex-col items-end"><span class="text-[9px] uppercase text-gray-600 font-bold mb-1 tracking-widest">${label}</span><div class="flex leading-none">${starsHtml}</div></div>`;
        }

        function handleStarClick(event, id, type, starIndex) {
            const rect = event.target.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const isHalf = clickX < rect.width / 2;
            const finalValue = isHalf ? starIndex - 0.5 : starIndex;
            for (let [key, p] of players) { if (p.id === id) { p[type] = finalValue; break; } }
            syncUI();
        }

        function runMatchmaking() {
            const size = parseInt(document.getElementById('teamSize').value);
            const playerArray = Array.from(players.values()).map(p => ({ ...p, score: (p.tech + p.phys) / 2 }));
            if (playerArray.length < size) return alert("Falta perna de pau para o baba!");
            
            const sorted = playerArray.sort(() => Math.random() - 0.5).sort((a, b) => b.score - a.score);
            const numTeams = Math.ceil(sorted.length / size);
            const teams = Array.from({ length: numTeams }, () => []);

            let dir = true, t = 0;
            sorted.forEach(p => {
                teams[t].push(p);
                if (dir) { if (t < numTeams - 1) t++; else dir = false; }
                else { if (t > 0) t--; else dir = true; }
            });
            currentTeams = teams;
            displayResults(teams);
        }

        function displayResults(teams) {
            const section = document.getElementById('resultsSection');
            const grid = document.getElementById('resultsGrid');
            section.classList.remove('hidden');
            grid.innerHTML = '';
            teams.forEach((team, i) => {
                const avg = (team.reduce((acc, p) => acc + p.score, 0) / team.length).toFixed(1);
                grid.innerHTML += `
                    <div class="bg-ea-panel p-6 border-t-4 border-ea-neon shadow-2xl">
                        <div class="flex justify-between items-start mb-6 border-b border-white/10 pb-4">
                            <h3 class="font-display text-3xl italic uppercase tracking-tighter text-white">Time ${i + 1}</h3>
                            <div class="text-right">
                                <p class="text-[9px] text-gray-500 font-bold uppercase">Média</p>
                                <span class="text-ea-neon font-display text-2xl font-bold italic">${avg}</span>
                            </div>
                        </div>
                        <ul class="space-y-3 mb-6">
                            ${team.map(p => `<li class="uppercase text-sm font-semibold flex justify-between items-center bg-black/30 p-2 rounded border border-white/5">
                                <span>${p.name}</span><span class="text-[10px] text-ea-neon font-bold opacity-70">${p.score.toFixed(1)}</span>
                            </li>`).join('')}
                        </ul>
                    </div>`;
            });
            window.scrollTo({ top: section.offsetTop - 50, behavior: 'smooth' });
        }

        function copyAllTeamsToClipboard() {
            if (currentTeams.length === 0) return;
            let textToCopy = ` *FUT-DESASTRE: CONVOCAÇÃO DO BABA* \n\n`;
            
            currentTeams.forEach((team, i) => {
                const avg = (team.reduce((acc, p) => acc + p.score, 0) / team.length).toFixed(1);
                textToCopy += `🏆 *TIME ${i + 1}* (OVR: ${avg})\n`;
                team.forEach((p, idx) => {
                    textToCopy += `${idx + 1}. ${p.name}\n`;
                });
                textToCopy += `------------------------------\n`;
            });
            
            textToCopy += `⚽ _Gerado via FUT-DESASTRE Engine_`;

            navigator.clipboard.writeText(textToCopy).then(() => {
                const btn = document.getElementById('btnCopyAll');
                const originalText = btn.innerHTML;
                btn.innerHTML = "✅ COPIADO!";
                btn.classList.add('bg-green-500', 'text-white');
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('bg-green-500', 'text-white');
                }, 2000);
            }).catch(err => {
                console.error('Erro ao copiar: ', err);
                alert("Erro ao copiar. Tente novamente.");
            });
        }

        function clearAll() { if(confirm("Deseja deletar o FUT-DESASTRE de hoje?")) { players.clear(); currentTeams = []; syncUI(); document.getElementById('resultsGrid').innerHTML = ''; document.getElementById('resultsSection').classList.add('hidden'); } }
    </script>
</body>
</html>
